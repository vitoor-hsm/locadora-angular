<app-menu-lateral></app-menu-lateral>

<div class="container-detalhes" *ngIf="movie; else templateNaoEncontrado">
    
    <div class="header-acoes">
        <button [routerLink]="['/admin']" class="btn-voltar">⬅ Voltar</button>
    </div>

    <div class="detalhes-card">
        <div class="capa-container">
            <img [src]="movie.posterUrl" [alt]="movie.title">
        </div>

        <div class="info">
            <h1>{{ movie.title }}</h1>
            
            <div class="tags">
                <span class="genero-tag">{{ movie.genre }}</span>
                <span class="ano-tag"> {{ movie.releaseYear }}</span>
            </div>
            
            <div class="sinopse">
                <h3>Sinopse</h3>
                <p class="descricao">{{ movie.synopsis }}</p>
            </div>
        </div>
    </div>
</div>

<ng-template #templateNaoEncontrado>
    <div class="erro-container">
        <div class="erro-card">
            <h2> Ops! Filme não encontrado.</h2>
            <p>O Filme que você está procurando não existe ou foi removido.</p>
            <button [routerLink]="['/admin']" class="btn-voltar-erro">Voltar para a Home</button>
        </div>
    </div>
</ng-template>
