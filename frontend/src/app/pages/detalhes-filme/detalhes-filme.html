<app-menu-lateral></app-menu-lateral>

<div class="main-content">
  <a routerLink="/user" class="btn-voltar">⬅ Voltar</a>

  <div class="detalhe-container" *ngIf="movie">
    <img [src]="movie.posterUrl" class="capa-grande">
    
    <div class="info-detalhada">
      <h1>{{ movie.title }}</h1>
      <div class="meta">
        <span>{{ movie.genre }}</span> • <span>{{ movie.releaseYear }}</span>
      </div>
      <p class="descricao">{{ movie.synopsis }}</p>
    </div>
  </div>
</div>
