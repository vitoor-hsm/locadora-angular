<div class="modal-overlay" *ngIf="exibir" (click)="fecharModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">

        <div class="modal-header">
            <h2>{{ movie?.title }}</h2>
            <button class="btn-fechar-topo" (click)="fecharModal()" aria-label="Fechar modal">
                <span class="x-icon">×</span>
            </button>
        </div>

        <div class="modal-body">
            <img [src]="movie?.posterUrl" [alt]="movie?.title" class="capa-detalhe">

            <div class="info-detalhada">
                <p class="linha-info">
                    <app-icone nome="claquete" class="icone-detalhe"></app-icone>
                    <span><strong>Gênero:</strong> {{ movie?.genre }}</span>
                </p>

                <p class="linha-info">
                    <app-icone nome="calendario" class="icone-detalhe"></app-icone>
                    <span><strong>Ano:</strong> {{ movie?.releaseYear }}</span>
                </p>

                <hr class="divisor">

                <div class="sinopse-container">
                    <strong>Sinopse:</strong>
                    <p class="sinopse">{{ movie?.synopsis || 'No description available.' }}</p>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-voltar" (click)="fecharModal()">
                <app-icone nome="voltar"></app-icone>
                Voltar para a vitrine
            </button>
        </div>
    </div>
</div>
