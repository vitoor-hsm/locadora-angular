<div *ngIf="toast" class="toast-container" [ngClass]="toast.tipo">
  <div class="conteudo">
    <app-icone 
      [nome]="toast.tipo === 'sucesso' ? 'status' : toast.tipo === 'erro' ? 'id' : ''"
      class="toast-icone">
    </app-icone>
    
    <span class="mensagem">{{ toast.mensagem }}</span>
  </div>

  <button class="btn-fechar" (click)="toast = null" title="Fechar">
    <app-icone nome="fechar" tamanho="20px"></app-icone>
  </button>
</div>
