<div class="modal-overlay" *ngIf="dados">
    <div class="modal-container">
        <div class="modal-header">
            <h2>{{ dados.titulo }}</h2>
        </div>
        
        <div class="modal-body">
            <p>{{ dados.mensagem }}</p>
        </div>

        <div class="modal-footer">
            <button class="btn-cancelar" (click)="aoCancelar()">Cancelar</button>
            <button class="btn-confirmar" (click)="aoConfirmar()">Confirmar</button>
        </div>
    </div>
</div>
