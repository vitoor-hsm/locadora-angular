<app-menu-lateral></app-menu-lateral>

<div class="conteudo-da-pagina">
  <h1>Bem-vindo, Administrador!</h1>
</div>
<div class="content-container">
  <header class="admin-header">
    <h1>Painel Administrativo</h1>
  </header>
  <div class="movie-grid">
    <div class="movie-cardie adm-card" *ngFor="let movie of movies">
      <img [src]="movie.posterUrl || movie.poster_url" [alt]="movie.title || movie.titulo">

      <div class="card-info">
        <h3>{{ movie.title || movie.titulo }}</h3>
        <p>{{ movie.genre || movie.genero }}</p>
      </div>

      <div class="adm-actions">
        <button class="btn-acao btn-view" [routerLink]="['/admin/filme', movie.id]" title="Visualizar">
          <app-icone nome="olho" tamanho="20px"></app-icone>
        </button>

        <button class="btn-acao btn-edit" [routerLink]="['/admin/filme/editar', movie.id]" title="Editar">
          <app-icone nome="editar" tamanho="20px"></app-icone>
        </button>

        <button class="btn-acao btn-delete" (click)="remover(movie.id)" title="Excluir">
          <app-icone nome="excluir" tamanho="20px"></app-icone>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="pagination" *ngIf="totalPages > 1">
  <button 
    class="btn-nav" 
    [disabled]="currentPage === 0" 
    (click)="changePage(currentPage - 1)">
    Anterior
  </button>

  <div class="page-numbers">
    <button 
      *ngFor="let p of [].constructor(totalPages); let i = index"
      [class.active]="i === currentPage"
      (click)="changePage(i)">
      {{ i + 1 }}
    </button>
  </div>

  <button 
    class="btn-nav" 
    [disabled]="currentPage === totalPages - 1" 
    (click)="changePage(currentPage + 1)">
    Próxima
  </button>
</div>
