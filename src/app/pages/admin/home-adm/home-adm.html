<app-menu-lateral></app-menu-lateral>

<div class="conteudo-da-pagina">
  <h1>Bem-vindo, Administrador!</h1>
</div>
<div class="content-container">
  <header class="admin-header">
    <h1>Painel Administrativo</h1>
  </header>
  <div class="movie-grid">
    <div class="movie-cardie adm-card" *ngFor="let filme of listaFilmes">
      <img [src]="filme.capa" [alt]="filme.titulo">

      <div class="card-info">
        <h3>{{ filme.titulo }}</h3>
        <p>{{ filme.genero }}</p>
      </div>

      <div class="adm-actions">
        <button class="btn-acao btn-view" [routerLink]="['/admin/filme', filme.id]" title="Visualizar">
          <app-icone nome="olho" tamanho="20px"></app-icone>
        </button>

        <button class="btn-acao btn-edit" [routerLink]="['/admin/filme/editar', filme.id]" title="Editar">
          <app-icone nome="editar" tamanho="20px"></app-icone>
        </button>

        <button class="btn-acao btn-delete" (click)="remover(filme.id)" title="Excluir">
          <app-icone nome="excluir" tamanho="20px"></app-icone>
        </button>
      </div>
    </div>
  </div>
</div>
