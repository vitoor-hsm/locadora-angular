<app-menu-lateral></app-menu-lateral>

<div class="main-content">
    <div class="form-container">
        <h2 class="form-title">{{isEdicao ? 'Editar Filme' : 'Novo Filme'}}</h2>

        <form [formGroup]="filmeForm" (ngSubmit)="salvar()">

            <div class="group">
                <label>Título</label>
                <input type="text" formControlName="titulo"
                    [class.is-invalid]="filmeForm.get('titulo')?.invalid && filmeForm.get('titulo')?.touched">
                <small class="error-msg" *ngIf="filmeForm.get('titulo')?.invalid && filmeForm.get('titulo')?.touched">
                    O título é obrigatório (mín. 3 letras).
                </small>
            </div>
            <div class="group">
                <label for="ano">Ano de Lançamento</label>
                <input type="number" id="ano" formControlName="ano" placeholder="Ex: 2024"
                    [class.is-invalid]="filmeForm.get('ano')?.invalid && filmeForm.get('ano')?.touched">
                <small class="error-msg" *ngIf="filmeForm.get('ano')?.invalid && filmeForm.get('ano')?.touched">
                    Ano deve ser entre 1895 e 2026.
                </small>
            </div>

            <div class="group">
                <label for="descricao">Descrição / Sinopse</label>
                <textarea id="descricao" formControlName="descricao" rows="4" placeholder="Digite o resumo do filme..."
                    [class.is-invalid]="filmeForm.get('descricao')?.invalid && filmeForm.get('descricao')?.touched"></textarea>
                <small class="error-msg"
                    *ngIf="filmeForm.get('descricao')?.invalid && filmeForm.get('descricao')?.touched">
                    A descrição é obrigatória (máx. 500 caracteres).
                </small>
            </div>
            <div class="group">
                <label>Gênero</label>
                <input type="text" formControlName="genero"
                    [class.is-invalid]="filmeForm.get('genero')?.invalid && filmeForm.get('genero')?.touched">

                <small class="error-msg" *ngIf="filmeForm.get('genero')?.invalid && filmeForm.get('genero')?.touched">
                    O gênero é obrigatório (mín. 3 letras).
                </small>
            </div>

            <div class="group">
                <label>URL da Capa</label>
                <input type="text" formControlName="capa" placeholder="https://exemplo.com/imagem.jpg"
                    [class.is-invalid]="filmeForm.get('capa')?.invalid && filmeForm.get('capa')?.touched">

                    <small class="error-msg" *ngIf="filmeForm.get('capa')?.invalid && filmeForm.get('capa')?.touched">
                    A URL da capa é obrigatória.
                </small>
            </div>

            <div class="acoes-form">
                <button type="submit" class="btn-salvar" >Confirmar</button>
                <button type="button" [routerLink]="['/admin']" class="btn-cancelar">Cancelar</button>
            </div>
        </form>
    </div>
</div>
