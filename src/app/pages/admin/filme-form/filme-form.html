<app-menu-lateral></app-menu-lateral>

<div class="main-content">
    <div class="form-container">
        <h2 class="form-title">{{isEdicao ? 'Editar Filme' : 'Novo Filme'}}</h2>

        <form (ngSubmit)="salvar()">
            <div class="group">
                <label>Título</label>
                <input type="text" [(ngModel)]="filme.titulo" name="titulo" required>
            </div>
            <div class="group">
                <label for="ano">Ano de Lançamento</label>
                <input type="number" id="ano" name="ano" [(ngModel)]="filme.ano" placeholder="Ex: 2024">
            </div>

            <div class="group">
                <label for="descricao">Descrição / Sinopse</label>
                <textarea id="descricao" name="descricao" [(ngModel)]="filme.descricao" rows="4"
                    placeholder="Digite o resumo do filme..."></textarea>
            </div>
            <div class="group">
                <label>Gênero</label>
                <input type="text" [(ngModel)]="filme.genero" name="genero" required>
            </div>

            <div class="group">
                <label>URL da Capa</label>
                <input type="text" [(ngModel)]="filme.capa" name="capa" required>
            </div>

            <div class="acoes-form">
                <button type="submit" class="btn-salvar">Confirmar</button>
                <button type="button" [routerLink]="['/admin']" class="btn-cancelar">Cancelar</button>
            </div>
        </form>
    </div>
</div>
