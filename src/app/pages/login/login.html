<div class="login-container">

  <button class="btn-contraste" (click) = "alternarContraste()" title="Alternar alto contraste">
   🌓 Acessibilidade (Alto Contraste)
  </button>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <h2>Locadora 🎬</h2>
  
    <label>Login</label>
    <input type="text" formControlName="login" placeholder="Usuário">
  
    <label>Senha</label>
    <input type="password" formControlName="senha" placeholder="Sua senha">
  
    <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
  
  
  </form>
</div>
