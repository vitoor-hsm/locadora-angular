<app-menu-lateral></app-menu-lateral>

<div class="login-container">

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="header-form">
      <app-icone nome="filme" tamanho="40px"></app-icone>
      <h2>Locadora</h2>
    </div>
    <label>Login</label>
    <input type="text" formControlName="login" placeholder="Usuário">

    <label>Senha</label>
    <input type="password" formControlName="senha" placeholder="Sua senha">

    <button type="submit" [disabled]="loginForm.invalid">Entrar</button>


  </form>
</div>
